name: Margin Manor XAU Bot Hourly V83

on:
  schedule:
    # Runs once every hour at minute 5, UTC time.
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-xau-hourly-bot:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: https://iycqrpfapqpawwrzkexh.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BOT_TIMEZONE: Asia/Singapore

      # Optional broker feed
      OANDA_API_TOKEN: ${{ secrets.OANDA_API_TOKEN }}
      OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
      OANDA_ENV: ${{ secrets.OANDA_ENV }}

      # Optional notifications
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Preflight checks
        shell: bash
        run: |
          set -e
          test -f requirements.txt || (echo "ERROR: requirements.txt is missing from repo root" && exit 10)
          test -f xau_hourly_bot_job.py || (echo "ERROR: xau_hourly_bot_job.py is missing from repo root" && exit 11)
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "ERROR: SUPABASE_SERVICE_ROLE_KEY GitHub secret is missing" && exit 13)
          python - <<'PY'
          import os, socket
          from urllib.parse import urlparse
          host = urlparse(os.environ["SUPABASE_URL"]).netloc
          print("Testing DNS host:", host)
          print("DNS resolved to:", socket.gethostbyname(host))
          PY

      - name: Install dependencies
        shell: bash
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import test
        shell: bash
        run: |
          set -e
          python - <<'PY'
          import pandas, numpy, yfinance, feedparser, requests
          from supabase import create_client
          print("Python imports OK.")
          PY

      - name: Run hourly XAU fundamental bot
        shell: bash
        run: |
          set -e
          python -u xau_hourly_bot_job.py
