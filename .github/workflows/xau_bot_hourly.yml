name: Margin Manor XAU Bot Hourly

on:
  schedule:
    # Runs once every hour at minute 5, in UTC time.
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-xau-hourly-bot:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Debug required files and secrets
        run: |
          echo "Checking required files..."
          test -f requirements.txt  (echo "ERROR: requirements.txt is missing from repo root" && exit 1)
          test -f xau_hourly_bot_job.py  (echo "ERROR: xau_hourly_bot_job.py is missing from repo root" && exit 1)

          echo "Checking GitHub secrets..."
          test -n "$SUPABASE_URL"  (echo "ERROR: SUPABASE_URL secret is missing" && exit 1)
          test -n "$SUPABASE_SERVICE_ROLE_KEY"  (echo "ERROR: SUPABASE_SERVICE_ROLE_KEY secret is missing" && exit 1)

          echo "All required files and secrets found."

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run hourly XAU fundamental bot
        run: |
          python xau_hourly_bot_job.py
