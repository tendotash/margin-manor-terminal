name: Margin Manor XAU Bot Hourly

on:
  schedule:
    # Runs once every hour at minute 5, in UTC time.
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-xau-hourly-bot:
    runs-on: ubuntu-latest

    env:
      # Supabase project URL, using the exact project ref you confirmed.
      SUPABASE_URL: https://iycqrpfapqpawwrzkexh.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Preflight checks
        shell: bash
        run: |
          set -e
          echo "Repo files:"
          ls -la

          echo "Checking required files..."
          test -f requirements.txt || (echo "ERROR: requirements.txt is missing from repo root" && exit 10)
          test -f xau_hourly_bot_job.py || (echo "ERROR: xau_hourly_bot_job.py is missing from repo root" && exit 11)

          echo "Checking key secret..."
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "ERROR: SUPABASE_SERVICE_ROLE_KEY GitHub secret is missing" && exit 13)

          echo "Supabase URL format check:"
          python - <<'PY'
          import os
          from urllib.parse import urlparse
          url = os.environ.get("SUPABASE_URL", "")
          print("URL:", url)
          print("Host:", urlparse(url).netloc)
          PY

      - name: Install dependencies
        shell: bash
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import test
        shell: bash
        run: |
          set -e
          python - <<'PY'
          import pandas, numpy, yfinance, feedparser, requests
          from supabase import create_client
          print("Python imports OK.")
          PY

      - name: DNS test Supabase URL
        shell: bash
        run: |
          set -e
          python - <<'PY'
          import os, socket
          from urllib.parse import urlparse
          host = urlparse(os.environ["SUPABASE_URL"]).netloc
          print("Testing DNS host:", host)
          print("DNS resolved to:", socket.gethostbyname(host))
          PY

      - name: Run hourly XAU fundamental bot
        shell: bash
        run: |
          set -e
          python -u xau_hourly_bot_job.py
