name: Margin Manor XAU Bot Hourly

on:
  schedule:
    # Runs once every hour at minute 5, in UTC time.
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-xau-hourly-bot:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Preflight checks
        shell: bash
        run: |
          set -e
          echo "Repo files:"
          ls -la

          echo "Python version:"
          python --version

          echo "Checking required files..."
          if [ ! -f "requirements.txt" ]; then
            echo "ERROR: requirements.txt is missing from the repo root."
            exit 10
          fi

          if [ ! -f "xau_hourly_bot_job.py" ]; then
            echo "ERROR: xau_hourly_bot_job.py is missing from the repo root."
            exit 11
          fi

          echo "Checking GitHub secrets..."
          if [ -z "$SUPABASE_URL" ]; then
            echo "ERROR: SUPABASE_URL GitHub secret is missing."
            exit 12
          fi

          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "ERROR: SUPABASE_SERVICE_ROLE_KEY GitHub secret is missing."
            exit 13
          fi

          echo "Preflight checks passed."

      - name: Install dependencies
        shell: bash
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import test
        shell: bash
        run: |
          set -e
          python - <<'PY'
          import pandas, numpy, yfinance, feedparser, requests
          from supabase import create_client
          print("Python imports OK.")
          PY

      - name: Run hourly XAU fundamental bot
        shell: bash
        run: |
          set -e
          python -u xau_hourly_bot_job.py
